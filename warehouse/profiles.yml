switchboard:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('DBT_HOST', 'localhost') }}"
      port: 5432
      user: "{{ env_var('DBT_USER', 'switchboard') }}"
      password: "{{ env_var('DBT_PASSWORD', 'switchboard') }}"
      dbname: "{{ env_var('DBT_DBNAME', 'switchboard') }}"
      schema: public
      threads: 4
